name: Local Postgresql

services:
  db:
    image: postgres:18.4-bookworm
    container_name: veggie-watch-local-db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-newbieAsian}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-veggieWathc@26}
      POSTGRES_DB: ${DATABASE_NAME:-veggie-watch}
    ports:
      - "6543:5432"
    volumes:
      - local_db_data:/var/lib/postgresql
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  local_db_data:
    driver: local
